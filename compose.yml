name: kura

services:
  seaweedfs:
    image: chrislusf/seaweedfs:4.37
    entrypoint: ["/bin/sh", "/kura/entrypoint.sh"]
    command:
      - server
      - -dir=/data
      - -master.port=9333
      # per-user bucket = per-collection volumes: the default -volume.max=8
      # runs out of volume slots as buckets accumulate, so let it auto-scale
      # with free disk instead
      - -volume.max=0
      - -master.volumeSizeLimitMB=${KURA_VOLUME_SIZE_LIMIT_MB}
      - -volume.port=8082
      - -filer
      - -filer.port=8888
      - -s3
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3.json
      - -s3.iam.config=/etc/seaweedfs/iam.json
      - -s3.allowedOrigins=${KURA_S3_ALLOWED_ORIGINS}
      - -ip.bind=0.0.0.0
    environment:
      KURA_OIDC_ISSUER: ${KURA_OIDC_ISSUER}
      KURA_OIDC_CLIENT_ID: ${KURA_OIDC_CLIENT_ID}
      KURA_OIDC_JWKS_URI: ${KURA_OIDC_JWKS_URI}
      KURA_STS_SIGNING_KEY: ${KURA_STS_SIGNING_KEY}
      KURA_ROOT_ACCESS_KEY: ${KURA_ROOT_ACCESS_KEY}
      KURA_ROOT_SECRET_KEY: ${KURA_ROOT_SECRET_KEY}
      KURA_FILER_JWT_KEY: ${KURA_FILER_JWT_KEY}
      KURA_ADMIN_SUBS: ${KURA_ADMIN_SUBS:-}
      # default-quota reconciler (entrypoint.sh, docs/operations.md)
      KURA_QUOTA_DEFAULT_MB: ${KURA_QUOTA_DEFAULT_MB:-1048576}
      KURA_OPS_INTERVAL_SECONDS: ${KURA_OPS_INTERVAL_SECONDS:-86400}
    volumes:
      - ./seaweedfs/entrypoint.sh:/kura/entrypoint.sh:ro
      - seaweedfs-data:/data
    ports:
      # S3 API のみ公開する。filer (8888) / master (9333) は内部 network に閉じる
      - "${KURA_S3_PORT}:8333"
    depends_on:
      jwks:
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8333/healthz"]
      interval: 2s
      timeout: 2s
      retries: 60

  nginx:
    image: nginx:1.29-alpine
    volumes:
      # The image entrypoint envsubsts templates/*.template into conf.d
      - ./nginx/kura.conf.template:/etc/nginx/templates/default.conf.template:ro
      # SPA build output (npm run build). Build before compose up.
      - ./build/client:/usr/share/nginx/html:ro
      # Public-delivery audit log; the worker (uid 101) must be able to write
      # here (docs/operations.md)
      - ${KURA_LOG_DIR:-./logs}:/var/log/kura
    environment:
      KURA_OIDC_ISSUER: ${KURA_OIDC_ISSUER}
      KURA_OIDC_CLIENT_ID: ${KURA_OIDC_CLIENT_ID}
      KURA_S3_ENDPOINT: ${KURA_S3_ENDPOINT}
      KURA_PUBLIC_BASE_URL: ${KURA_PUBLIC_BASE_URL}
      KURA_FILE_TTL_DAYS: ${KURA_FILE_TTL_DAYS:-}
    ports:
      - "${KURA_HTTP_PORT}:8080"
    depends_on:
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/healthz"]
      interval: 2s
      timeout: 2s
      retries: 30

  # 日次の運用タスク: file TTL 削除・放置 multipart 掃除・監査ログの
  # 圧縮/期限削除 (docs/operations.md)。node は TS を直接実行できる
  ops:
    image: node:24-alpine
    command: ["node", "/kura/scripts/ops-loop.ts"]
    environment:
      # compose 内部から S3 へ直接届く endpoint（env ファイルの値はホスト向け）
      KURA_S3_ENDPOINT: http://seaweedfs:8333
      KURA_ROOT_ACCESS_KEY: ${KURA_ROOT_ACCESS_KEY}
      KURA_ROOT_SECRET_KEY: ${KURA_ROOT_SECRET_KEY}
      KURA_FILE_TTL_DAYS: ${KURA_FILE_TTL_DAYS:-}
      KURA_MULTIPART_MAX_AGE_DAYS: ${KURA_MULTIPART_MAX_AGE_DAYS:-}
      KURA_AUDIT_RETENTION_DAYS: ${KURA_AUDIT_RETENTION_DAYS:-}
      KURA_OPS_INTERVAL_SECONDS: ${KURA_OPS_INTERVAL_SECONDS:-86400}
    volumes:
      - ./scripts:/kura/scripts:ro
      - ./node_modules:/kura/node_modules:ro
      - ${KURA_LOG_DIR:-./logs}:/var/log/kura
    depends_on:
      seaweedfs:
        condition: service_healthy

  # テスト時のみ: 自前鍵の JWKS を SeaweedFS の OIDC provider へ配信する
  jwks:
    image: nginx:1.29-alpine
    profiles: [test]
    volumes:
      - ./tests/setup/.jwks:/usr/share/nginx/html:ro

volumes:
  seaweedfs-data:
