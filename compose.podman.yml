# rootless podman-compose overlay. compose.yml と合わせて使う:
#   podman-compose --env-file .env -f compose.yml -f compose.podman.yml up -d
#
# .env は env.production の内容 + secrets を merge した 1 ファイルにする
# (podman-compose 1.0.6 は --env-file を複数回渡すと最後の 1 個しか読まない)。
#
# rootless podman + Lustre bind mount 上での注意点:
# - Lustre は subuid range (222700000+) の uid の write / read を拒否するため、
#   container 内 process が Lustre 上の bind mount を触るには container 内 uid が
#   host uid (w3ddbjld = 2227) にマップされる必要がある。
#   * seaweedfs: image が uid 1000 で走る -> `userns_mode: keep-id:uid=1000` で
#     container 内 uid 1000 = host uid w3ddbjld にマップ
#   * nginx: worker default uid 101 も subuid range に落ちる -> `user root;` に
#     置換する docker-entrypoint.d/ init script を bind
#   * ops / kura-init: container 内 root で走る (default) → host w3ddbjld として
#     Lustre を触れる。userns 追加は不要
# - Lustre は chown を拒否する (subuid target)。kura-init は chmod 0777 に切り替え
#   済み (base compose.yml)
#
# label=disable は SELinux 環境向けの慣習 (a012 の Ubuntu は SELinux 無効なので
# 実害なし、他 DDBJ サービスと足並みを揃える)。

services:
  kura-init:
    security_opt:
      - label=disable

  seaweedfs:
    userns_mode: "keep-id:uid=1000,gid=1000"
    security_opt:
      - label=disable

  nginx:
    security_opt:
      - label=disable
    volumes:
      - ./nginx/05-strip-user-directive.sh:/docker-entrypoint.d/05-strip-user-directive.sh:ro

  ops:
    security_opt:
      - label=disable
